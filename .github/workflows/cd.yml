name: CD - Azure VM Docker Deployment

on:
  workflow_run:
    workflows:
      - CI - Backend Docker Build and Publish
    types:
      - completed

jobs:
  deploy-ai-swarm:
    name: CD - Deploy ai_swarm to Azure VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy ai_swarm to Azure VM via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_AI_SWARM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: 22
          script: |
            set -e
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/researchswarm-ai_swarm:latest
            docker stop researchswarm-ai_swarm || true
            docker rm researchswarm-ai_swarm || true
            docker run -d --name researchswarm-ai_swarm --restart always -p 80:8000 ${{ secrets.DOCKERHUB_USERNAME }}/researchswarm-ai_swarm:latest

