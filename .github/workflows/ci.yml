name: Build and push backend Docker images

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-and-push:
    name: Build and push backend services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ai_swarm image
        uses: docker/build-push-action@v5
        with:
          context: ./apis/ai_swarm
          file: ./apis/ai_swarm/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/researchswarm-ai_swarm:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/researchswarm-ai_swarm:${{ github.sha }}

      - name: Build and push tool_service image
        uses: docker/build-push-action@v5
        with:
          context: ./apis/tool_service
          file: ./apis/tool_service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/researchswarm-tool_service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/researchswarm-tool_service:${{ github.sha }}
